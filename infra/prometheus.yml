global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'campaign-service'
    static_configs:
      - targets: ['campaign-service:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:8081']
    metrics_path: '/metrics'

  - job_name: 'optimization-service'
    static_configs:
      - targets: ['optimization-service:8082']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
